<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Hyrox">
<meta name="theme-color" content="#0b1220">
<title>Hyrox Workout Plan</title>
<style>
  :root { --bg:#0b1220; --card:#161f33; --accent:#34d399; --accent-dim:#10b981; --red:#f87171; --text:#e8edf7; --muted:#8a96ad; }
  * { box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  html,body { margin:0; padding:0; height:100%; }
  body { font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif; background:radial-gradient(circle at 50% 0%,#1a2540 0%,var(--bg) 60%); color:var(--text); min-height:100vh; display:flex; flex-direction:column; align-items:center; padding:max(env(safe-area-inset-top),24px) 20px max(env(safe-area-inset-bottom),24px); }
  h1 { font-size:17px; font-weight:600; letter-spacing:.5px; color:var(--muted); text-transform:uppercase; margin:8px 0 18px; }
  .count { font-size:64px; font-weight:700; letter-spacing:-1px; font-variant-numeric:tabular-nums; line-height:1.05; margin:2px 0; }
  .count .done { color:var(--accent); }
  .subtitle { font-size:14px; color:var(--muted); margin-bottom:18px; }
  .bar { width:100%; max-width:420px; height:10px; background:#0e1626; border-radius:6px; overflow:hidden; margin-bottom:24px; }
  .bar .fill { height:100%; width:0%; background:var(--accent); border-radius:6px; transition:width .2s ease; }
  .list { width:100%; max-width:420px; display:flex; flex-direction:column; gap:10px; margin-bottom:20px; }
  .item { display:flex; align-items:center; gap:14px; width:100%; text-align:left; font-family:inherit; color:var(--text); background:var(--card); border:1px solid transparent; border-radius:16px; padding:16px; cursor:pointer; -webkit-appearance:none; appearance:none; transition:transform .08s,border-color .2s,opacity .2s; }
  .item:active { transform:scale(0.985); }
  .item.done { border-color:var(--accent-dim); opacity:.65; }
  .item.done .name { text-decoration:line-through; color:var(--muted); }
  .check { flex:0 0 26px; width:26px; height:26px; border-radius:50%; border:2px solid var(--muted); display:flex; align-items:center; justify-content:center; font-size:15px; color:#06231a; }
  .item.done .check { background:var(--accent); border-color:var(--accent); }
  .check::after { content:"\2713"; opacity:0; }
  .item.done .check::after { opacity:1; }
  .meta { display:flex; flex-direction:column; }
  .name { font-size:16px; font-weight:600; }
  .detail { font-size:13px; color:var(--muted); margin-top:2px; }
  .reset { background:none; border:none; color:var(--muted); font-size:14px; padding:10px; cursor:pointer; text-decoration:underline; }
  .footnote { font-size:11px; color:var(--muted); max-width:420px; text-align:center; margin-top:4px; }
</style>
</head>
<body>
  <h1>Hyrox Workout Plan</h1>
  <div class="count"><span class="done" id="doneCount">0</span> / <span id="totalCount">8</span></div>
  <div class="subtitle">stations complete &mdash; tap one to log it</div>
  <div class="bar"><div class="fill" id="fill"></div></div>
  <div class="list" id="list"></div>
  <button class="reset" id="reset">Reset workout</button>
  <div class="footnote">Standard Hyrox: 1&nbsp;km run before every station. Tap a station when you finish it &mdash; progress is saved automatically.</div>
  <a href="index.html" style="display:inline-block;margin-top:18px;color:#8a96ad;font-size:14px;text-decoration:underline;">&larr; Back to earnings tracker</a>
<script>
  const KEY='hyroxPlan.v1';
  const STATIONS=[
    {name:'1000m SkiErg',        detail:'Run 1 km, then ski'},
    {name:'50m Sled Push',       detail:'Run 1 km, then push'},
    {name:'50m Sled Pull',       detail:'Run 1 km, then pull'},
    {name:'80m Burpee Broad Jumps', detail:'Run 1 km, then burpees'},
    {name:'1000m Row',           detail:'Run 1 km, then row'},
    {name:'200m Farmers Carry',  detail:'Run 1 km, then carry'},
    {name:'100m Sandbag Lunges', detail:'Run 1 km, then lunge'},
    {name:'100 Wall Balls',      detail:'Run 1 km, then wall balls'}
  ];
  const $=id=>document.getElementById(id);
  let done=load();
  function load(){ try{ const s=JSON.parse(localStorage.getItem(KEY)); if(Array.isArray(s)&&s.length===STATIONS.length) return s; }catch(e){} return STATIONS.map(()=>false); }
  function save(){ try{ localStorage.setItem(KEY,JSON.stringify(done)); }catch(e){} }
  function render(){
    const total=STATIONS.length, count=done.filter(Boolean).length;
    $('doneCount').textContent=count; $('totalCount').textContent=total;
    $('fill').style.width=(count/total*100)+'%';
    [...$('list').children].forEach((el,i)=>el.classList.toggle('done',done[i]));
  }
  STATIONS.forEach((s,i)=>{
    const item=document.createElement('button'); item.type='button'; item.className='item';
    item.innerHTML='<div class="check"></div><div class="meta"><div class="name">'+s.name+'</div><div class="detail">'+s.detail+'</div></div>';
    // This is the click-to-update line: toggle the station, save, and re-render.
    item.addEventListener('click',()=>{ done[i]=!done[i]; save(); render(); });
    $('list').appendChild(item);
  });
  $('reset').addEventListener('click',()=>{ if(confirm('Reset all stations?')){ done=STATIONS.map(()=>false); save(); render(); } });
  render();
</script>
</body>
</html>
