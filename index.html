<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Earnings">
<meta name="theme-color" content="#0b1220">
<title>Earnings Tracker</title>
<style>
  :root { --bg:#0b1220; --card:#161f33; --accent:#34d399; --accent-dim:#10b981; --red:#f87171; --text:#e8edf7; --muted:#8a96ad; }
  * { box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  html,body { margin:0; padding:0; height:100%; }
  body { font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif; background:radial-gradient(circle at 50% 0%,#1a2540 0%,var(--bg) 60%); color:var(--text); min-height:100vh; display:flex; flex-direction:column; align-items:center; padding:max(env(safe-area-inset-top),24px) 20px max(env(safe-area-inset-bottom),24px); }
  h1 { font-size:17px; font-weight:600; letter-spacing:.5px; color:var(--muted); text-transform:uppercase; margin:8px 0 24px; }
  .status { font-size:14px; color:var(--muted); margin-bottom:6px; min-height:18px; }
  .status.on { color:var(--accent); }
  .earnings { font-size:17vw; font-weight:700; letter-spacing:-1px; font-variant-numeric:tabular-nums; line-height:1.05; margin:4px 0 2px; }
  @media (min-width:480px){ .earnings { font-size:72px; } }
  .persec { font-size:15px; color:var(--accent-dim); font-variant-numeric:tabular-nums; margin-bottom:28px; }
  .grid { display:grid; grid-template-columns:1fr 1fr; gap:12px; width:100%; max-width:420px; margin-bottom:24px; }
  .stat { background:var(--card); border-radius:16px; padding:16px; text-align:center; }
  .stat .label { font-size:12px; color:var(--muted); text-transform:uppercase; letter-spacing:.5px; }
  .stat .value { font-size:22px; font-weight:600; margin-top:6px; font-variant-numeric:tabular-nums; }
  .rate-row { display:flex; align-items:center; gap:8px; background:var(--card); border-radius:16px; padding:14px 18px; width:100%; max-width:420px; margin-bottom:20px; justify-content:space-between; }
  .rate-row label { font-size:14px; color:var(--muted); }
  .rate-input { display:flex; align-items:center; gap:2px; }
  .rate-input span { font-size:18px; color:var(--muted); }
  input[type="number"] { background:#0e1626; border:1px solid #2a364f; color:var(--text); font-size:18px; font-weight:600; width:90px; text-align:right; padding:8px 10px; border-radius:10px; -moz-appearance:textfield; }
  input::-webkit-outer-spin-button,input::-webkit-inner-spin-button { -webkit-appearance:none; margin:0; }
  .btn { width:100%; max-width:420px; border:none; border-radius:18px; padding:20px; font-size:20px; font-weight:700; color:#06231a; background:var(--accent); cursor:pointer; margin-bottom:12px; transition:transform .08s,background .2s; }
  .btn:active { transform:scale(0.98); }
  .btn.out { background:var(--red); color:#2a0606; }
  .reset { background:none; border:none; color:var(--muted); font-size:14px; padding:10px; cursor:pointer; text-decoration:underline; }
</style>
</head>
<body>
  <h1>Earnings Tracker</h1>
  <div class="status" id="status">Clocked out</div>
  <div class="earnings" id="earnings">$0.00</div>
  <div class="persec" id="persec">$0.0000 / sec</div>
  <div class="grid">
    <div class="stat"><div class="label">Time on clock</div><div class="value" id="elapsed">00:00:00</div></div>
    <div class="stat"><div class="label">Clocked in at</div><div class="value" id="clockedAt">&mdash;</div></div>
  </div>
  <div class="rate-row">
    <label for="rate">Hourly rate</label>
    <div class="rate-input"><span>$</span><input type="number" id="rate" value="18" min="0" step="0.25" inputmode="decimal"></div>
  </div>
  <button class="btn" id="toggle">Clock In</button>
  <button class="reset" id="reset">Reset session</button>
<script>
  const KEY='earningsTracker.v1';
  const $=id=>document.getElementById(id);
  let state=load();
  function load(){ try{ const s=JSON.parse(localStorage.getItem(KEY)); if(s&&typeof s==='object') return s; }catch(e){} return {clockedIn:false,startTime:null,accrued:0,rate:18}; }
  function save(){ try{ localStorage.setItem(KEY,JSON.stringify(state)); }catch(e){} }
  $('rate').value=state.rate;
  function ratePerSec(){ return (parseFloat(state.rate)||0)/3600; }
  function currentEarnings(){ let t=state.accrued; if(state.clockedIn&&state.startTime){ t+=((Date.now()-state.startTime)/1000)*ratePerSec(); } return t; }
  function currentElapsed(){ return (state.clockedIn&&state.startTime)?Date.now()-state.startTime:0; }
  function fmtTime(ms){ const t=Math.floor(ms/1000); const h=String(Math.floor(t/3600)).padStart(2,'0'); const m=String(Math.floor((t%3600)/60)).padStart(2,'0'); const s=String(t%60).padStart(2,'0'); return h+':'+m+':'+s; }
  function render(){ $('earnings').textContent='$'+currentEarnings().toFixed(2); $('persec').textContent='$'+ratePerSec().toFixed(4)+' / sec'; $('elapsed').textContent=fmtTime(currentElapsed()); const st=$('status'); if(state.clockedIn){ st.textContent='On the clock'; st.classList.add('on'); $('clockedAt').textContent=new Date(state.startTime).toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'}); $('toggle').textContent='Clock Out'; $('toggle').classList.add('out'); } else { st.textContent='Clocked out'; st.classList.remove('on'); $('toggle').textContent='Clock In'; $('toggle').classList.remove('out'); } }
  $('toggle').addEventListener('click',()=>{ if(state.clockedIn){ state.accrued=currentEarnings(); state.clockedIn=false; state.startTime=null; } else { state.rate=parseFloat($('rate').value)||0; state.clockedIn=true; state.startTime=Date.now(); } save(); render(); });
  $('reset').addEventListener('click',()=>{ if(confirm('Reset this session to $0.00?')){ state={clockedIn:false,startTime:null,accrued:0,rate:parseFloat($('rate').value)||18}; save(); render(); } });
  $('rate').addEventListener('change',()=>{ state.rate=parseFloat($('rate').value)||0; save(); render(); });
  setInterval(render,200); render();
</script>
</body>
</html>
